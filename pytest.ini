[pytest]
testpaths        = tests
python_files     = test_*.py
python_classes   = Test*
python_functions = test_*
addopts          =
    -v
    --tb=short
    --strict-markers
    --no-header
markers =
    unit:        fast unit tests (no I/O)
    integration: tests that call external services (skipped in CI by default)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
